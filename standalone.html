<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسوقاتي AI - Standalone</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Google Generative AI -->
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9fafb;
        }
        .prose p {
            margin-bottom: 1em;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { GoogleGenAI } from "@google/genai";
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Configuration ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0875902085",
            appId: "1:852106800021:web:2420af81b94cc4b67d649c",
            apiKey: "AIzaSyBcFY_4bq5HWWAeN3aNU4fFWA7P8_LJ-RQ",
            authDomain: "gen-lang-client-0875902085.firebaseapp.com",
            storageBucket: "gen-lang-client-0875902085.firebasestorage.app",
            messagingSenderId: "852106800021",
            measurementId: ""
        };
        const firestoreDatabaseId = "ai-studio-6100c38d-0c90-47d2-bd34-dbb846b47b30";
        const GEMINI_API_KEY = "AIzaSyBcFY_4bq5HWWAeN3aNU4fFWA7P8_LJ-RQ"; // Note: In standalone, this is exposed.

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // If using a named database, we'd need the v9+ SDK or a specific compat hack. 
        // For simplicity in standalone, we assume default or use the config's project.
        
        const ai = new GoogleGenAI(GEMINI_API_KEY);

        // --- Icons (Simple SVG Components) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            // Mapping names to simple SVG paths (subset of Lucide)
            const icons = {
                PenTool: <path d="m12 19 7-7 3 3-7 7-3-3Zm0 0-3-3m0 0 2.29-2.29c.39-.39.39-1.02 0-1.41l-4.24-4.24c-.39-.39-1.02-.39-1.41 0L3.34 10.4c-.39.39-.39 1.02 0 1.41l4.24 4.24c.39.39 1.02.39 1.41 0L11.29 13.7M9 16l-2 2" />,
                LayoutDashboard: <path d="M3 3h7v7H3zm11 0h7v7h-7zm0 11h7v7h-7zM3 14h7v7H3z" />,
                CreditCard: <rect width="20" height="14" x="2" y="5" rx="2" /><path d="M2 10h20" />,
                Settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" />,
                LogOut: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9" />,
                Plus: <path d="M12 5v14m-7-7h14" />,
                ImageIcon: <rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Copy: <rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />,
                AlertCircle: <circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />,
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3-3.5 3.5z" />,
                Video: <path d="m22 8-6 4 6 4V8Z" /><rect width="14" height="12" x="2" y="6" rx="2" ry="2" />,
                Smartphone: <rect width="14" height="20" x="5" y="2" rx="2" ry="2" /><path d="M12 18h.01" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9v4m4-4v4" />,
                BarChart3: <path d="M3 3v18h18m-18-4h4m4-4h4m4-4h4" />,
                Search: <circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('app_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [profile, setProfile] = useState(null);
            const [activeTab, setActiveTab] = useState('generate');
            const [productName, setProductName] = useState('');
            const [productDesc, setProductDesc] = useState('');
            const [refinement, setRefinement] = useState('');
            const [generatedPosts, setGeneratedPosts] = useState([]);
            const [generatedScripts, setGeneratedScripts] = useState([]);
            const [generating, setGenerating] = useState(false);
            const [image, setImage] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            
            const [phone, setPhone] = useState('');
            const [password, setPassword] = useState('');
            const [displayName, setDisplayName] = useState('');
            const [authMode, setAuthMode] = useState('login');
            
            const [activationKey, setActivationKey] = useState('');
            const [stats, setStats] = useState(null);
            const [adminKeys, setAdminKeys] = useState([]);
            const [allUsersCount, setAllUsersCount] = useState(0);
            const [searchId, setSearchId] = useState('');
            const [foundUser, setFoundUser] = useState(null);

            useEffect(() => {
                if (user?.uid) {
                    const unsub = db.collection('users').doc(user.uid).onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            setProfile(data);
                            if (data.phone === 'admin' && data.role !== 'admin') {
                                db.collection('users').doc(user.uid).update({ role: 'admin' });
                            }
                        }
                    });
                    return unsub;
                }
            }, [user]);

            useEffect(() => {
                if (profile?.role === 'admin') {
                    const unsubStats = db.collection('stats').doc('global').onSnapshot(d => setStats(d.data()));
                    const unsubKeys = db.collection('activationKeys').onSnapshot(s => {
                        setAdminKeys(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt));
                    });
                    db.collection('users').get().then(s => setAllUsersCount(s.size));
                    return () => { unsubStats(); unsubKeys(); };
                }
            }, [profile]);

            useEffect(() => {
                const bootstrap = async () => {
                    const adminDoc = await db.collection('users').doc('admin').get();
                    if (!adminDoc.exists) {
                        await db.collection('users').doc('admin').set({
                            uid: 'admin',
                            phone: 'admin',
                            password: '1182019', 
                            displayName: 'المدير العام',
                            role: 'admin',
                            shortId: '000000',
                            createdAt: Date.now(),
                            isActiveUntil: null
                        });
                    }
                };
                bootstrap();
            }, []);

            const handleLogin = async () => {
                setError(null);
                if (!phone || !password) return setError('كمل البيانات يا بطل');
                try {
                    const s = await db.collection('users').where('phone', '==', phone).where('password', '==', password).get();
                    if (s.empty) return setError('البيانات غلط، ركز شوية');
                    const userData = { uid: s.docs[0].id, ...s.docs[0].data() };
                    setUser(userData);
                    localStorage.setItem('app_user', JSON.stringify(userData));
                } catch (e) { setError(e.message); }
            };

            const handleRegister = async () => {
                setError(null);
                if (!phone || !password || !displayName) return setError('كمل البيانات كلها');
                try {
                    const s = await db.collection('users').where('phone', '==', phone).get();
                    if (!s.empty) return setError('الرقم ده مسجل قبل كده');
                    const uid = 'u_' + Date.now();
                    const shortId = Math.floor(100000 + Math.random() * 900000).toString();
                    const userData = { uid, phone, password, displayName, role: 'user', shortId, createdAt: Date.now(), isActiveUntil: null };
                    await db.collection('users').doc(uid).set(userData);
                    setUser(userData);
                    localStorage.setItem('app_user', JSON.stringify(userData));
                } catch (e) { setError(e.message); }
            };

            const handleImageChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        setImage({ type: file.type, base64 });
                        setImagePreview(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleGenerate = async () => {
                if (!productName && !image) return setError('اكتب اسم المنتج أو ارفع صورة الأول');
                const now = Date.now();
                if (profile?.role !== 'admin' && (!profile?.isActiveUntil || profile.isActiveUntil < now)) {
                    return setError('اشتراكك خلص يا نجم، كلم المدير فعل الحساب');
                }
                setGenerating(true); setError(null);
                const isTikTok = activeTab === 'tiktok';
                const systemPrompt = isTikTok 
                    ? `أنت خبير صناعة محتوى تيك توك (TikTok Creator) مصري محترف، مثقف، ولبق جداً. مهمتك كتابة 3 نماذج لسكربتات فيديو تيك توك قصيرة ومبهرة بالعامية المصرية الراقية.
السكربت لازم يكون "خاطف" من أول ثانية، بأسلوب ذكي ومحترم (لغة ولاد الناس).
ممنوع الفصحى تماماً، وممنوع الابتذال. استخدم تعبيرات مصرية شيك (زي: "يا أهلاً بيكم"، "حاجة في منتهى الشياكة"، "تجربة تستحق").
إذا وجدت صورة، حللها وادمج تفاصيلها في السكربت بذكاء.
اكتب 3 سكربتات فقط، بدون أي مقدمات.
افصل بين كل سكربت والتاني بكلمة "---SPLIT---".`
                    : `أنت كاتب محتوى تسويقي مصري محترف، مثقف، ولبق جداً. مهمتك كتابة 3 نماذج لبوستات سوشيال ميديا بالعامية المصرية الراقية (لغة الطبقة المثقفة).
ممنوع تماماً استخدام لغة عربية فصحى (زي: هذا، سوف، نحن، رائع، مذهل).
استخدم بدائل مصرية مهذبة وشيك (زي: "ده"، "دي"، "هنـ"، "إحنا"، "حاجة راقية"، "ممتاز"، "اتفضلوا").
الأسلوب لازم يكون "سمبل" وشيك، كأنك بتكلم عميل VIP في مكان هادي.
إذا وجدت صورة، حللها كأنك خبير: "شوف" التفاصيل، الألوان، والجودة، واستخدم ده في الإقناع.
اكتب 3 بوستات فقط، بدون أي رغي زيادة.
افصل بين كل بوست والتاني بكلمة "---SPLIT---".`;

                let promptText = "";
                if (productName) promptText += `اسم المنتج/الموضوع: ${productName}. \n`;
                if (productDesc) promptText += `تفاصيل: ${productDesc}. \n`;
                if (image) promptText += `بص على الصورة دي كويس وحللها واكتب عنها بأسلوب شيك. \n`;
                if (refinement) promptText += `ملحوظة مهمة من المستخدم: ${refinement} \n`;
                
                try {
                    const model = ai.getGenerativeModel({ model: "gemini-1.5-flash", systemInstruction: systemPrompt });
                    let result;
                    if (image) {
                        result = await model.generateContent([promptText, { inlineData: { data: image.base64, mimeType: image.type } }]);
                    } else {
                        result = await model.generateContent(promptText);
                    }
                    const text = result.response.text();
                    if (text) {
                        const results = text.split('---SPLIT---').map(p => p.trim()).filter(p => p.length > 0);
                        if (isTikTok) setGeneratedScripts(results.slice(0, 3));
                        else setGeneratedPosts(results.slice(0, 3));
                        setSuccess(isTikTok ? 'السكربتات جاهزة يا نجم! 🎬' : 'البوستات جاهزة يا فنان! ✨');
                        await db.collection('stats').doc('global').update({ aiRequestsCount: firebase.firestore.FieldValue.increment(1) }).catch(()=>{});
                    } else throw new Error('جيمناي مطلعش رد، جرب تاني');
                } catch (e) { setError('مشكلة في الذكاء الاصطناعي: ' + e.message); }
                setGenerating(false);
            };

            const handleActivate = async () => {
                if (!activationKey) return;
                try {
                    const keyDoc = await db.collection('activationKeys').doc(activationKey).get();
                    if (!keyDoc.exists || keyDoc.data()?.used) return setError('الكود ده غلط أو استُخدم قبل كده');
                    const days = keyDoc.data()?.days;
                    const currentEnd = profile?.isActiveUntil || Date.now();
                    const newEnd = Math.max(currentEnd, Date.now()) + (days * 24 * 60 * 60 * 1000);
                    await db.collection('users').doc(user.uid).update({ isActiveUntil: newEnd });
                    await db.collection('activationKeys').doc(activationKey).update({ used: true });
                    setSuccess(`تم التفعيل بنجاح لمدة ${days} يوم!`);
                    setActivationKey('');
                } catch (e) { setError(e.message); }
            };

            const generateKey = async (days) => {
                const id = Math.random().toString(36).substring(2, 10).toUpperCase();
                await db.collection('activationKeys').doc(id).set({ days, used: false, createdAt: Date.now() });
            };

            const searchUser = async () => {
                if (!searchId) return;
                const s = await db.collection('users').where('shortId', '==', searchId).get();
                if (s.empty) return setError('المستخدم مش موجود');
                setFoundUser({ uid: s.docs[0].id, ...s.docs[0].data() });
            };

            const logout = () => { setUser(null); localStorage.removeItem('app_user'); };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-600 to-indigo-900" dir="rtl">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
                            <div className="p-8 text-center bg-blue-50">
                                <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg rotate-3">
                                    <Icon name="PenTool" className="text-white w-10 h-10 -rotate-3" />
                                </div>
                                <h1 className="text-3xl font-black text-blue-900 mb-2">مسوقاتي AI</h1>
                                <p className="text-blue-600 font-medium">كاتب البوستات المصري الروش</p>
                            </div>
                            <div className="p-8 space-y-4">
                                {error && <div className="bg-red-50 text-red-600 p-4 rounded-2xl flex items-center gap-2 text-sm font-bold border border-red-100"><Icon name="AlertCircle" className="w-4 h-4" /> {error}</div>}
                                <div className="space-y-3">
                                    <div className="relative">
                                        <Icon name="Smartphone" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                        <input type="text" placeholder="رقم الموبايل" value={phone} onChange={e => setPhone(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                    </div>
                                    <div className="relative">
                                        <Icon name="Key" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                        <input type="password" placeholder="كلمة السر" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                    </div>
                                    {authMode === 'register' && (
                                        <div className="relative">
                                            <Icon name="Users" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                            <input type="text" placeholder="اسمك بالكامل" value={displayName} onChange={e => setDisplayName(e.target.value)} className="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                        </div>
                                    )}
                                </div>
                                <button onClick={authMode === 'login' ? handleLogin : handleRegister} className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">{authMode === 'login' ? 'دخول يا بطل' : 'سجل حساب جديد'}</button>
                                <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="w-full text-gray-500 font-bold text-sm hover:text-blue-600 transition-colors">{authMode === 'login' ? 'معندكش حساب؟ سجل من هنا' : 'عندك حساب؟ ادخل من هنا'}</button>
                            </div>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 pb-24" dir="rtl">
                    <header className="bg-white border-b sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-md"><Icon name="PenTool" className="text-white w-6 h-6" /></div>
                                <div>
                                    <h1 className="font-black text-blue-900 leading-tight">مسوقاتي AI</h1>
                                    <span className="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold">V42</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="text-left hidden sm:block">
                                    <p className="text-xs font-bold text-gray-900">{profile?.displayName}</p>
                                    <p className="text-[10px] text-gray-500">ID: {profile?.shortId}</p>
                                </div>
                                <button onClick={logout} className="p-2 text-gray-400 hover:text-red-500 transition-colors"><Icon name="LogOut" className="w-5 h-5" /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        <div className="flex bg-gray-100 p-1 rounded-2xl mb-8">
                            <button onClick={() => { setActiveTab('generate'); setGeneratedPosts([]); setGeneratedScripts([]); }} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all flex items-center justify-center gap-2 ${activeTab === 'generate' ? "bg-white text-blue-600 shadow-sm" : "text-gray-500"}`}><Icon name="PenTool" className="w-4 h-4" /> بوست فيسبوك</button>
                            <button onClick={() => { setActiveTab('tiktok'); setGeneratedPosts([]); setGeneratedScripts([]); }} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all flex items-center justify-center gap-2 ${activeTab === 'tiktok' ? "bg-white text-blue-600 shadow-sm" : "text-gray-500"}`}><Icon name="Video" className="w-4 h-4" /> سكربت تيك توك</button>
                            {profile?.role === 'admin' && <button onClick={() => setActiveTab('admin')} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all flex items-center justify-center gap-2 ${activeTab === 'admin' ? "bg-white text-blue-600 shadow-sm" : "text-gray-500"}`}><Icon name="Settings" className="w-4 h-4" /> الإدارة</button>}
                        </div>

                        <AnimatePresence mode="wait">
                            {(activeTab === 'generate' || activeTab === 'tiktok') && (
                                <motion.div key={activeTab} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="space-y-6">
                                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border space-y-6">
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">{activeTab === 'tiktok' ? 'عنوان الفيديو أو الموضوع' : 'اسم المنتج'}</label>
                                                <input type="text" placeholder={activeTab === 'tiktok' ? "مثلاً: نصائح للعناية بالبشرة..." : "مثلاً: طقم كاجوال صيفي"} value={productName} onChange={e => setProductName(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">وصف إضافي (اختياري)</label>
                                                <textarea placeholder="اكتب أي تفاصيل تانية عايزها تظهر..." value={productDesc} onChange={e => setProductDesc(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold min-h-[100px] resize-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2 text-blue-600">محتاج تعديل إيه؟ (اختياري)</label>
                                                <input type="text" placeholder="مثلاً: خليه أقصر، أو ركز على السعر..." value={refinement} onChange={e => setRefinement(e.target.value)} className="w-full p-4 bg-blue-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <label className="flex-1 flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-200 rounded-3xl hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer group">
                                                    <Icon name="ImageIcon" className="w-8 h-8 text-gray-400 group-hover:text-blue-500 mb-2" />
                                                    <span className="text-xs font-bold text-gray-500 group-hover:text-blue-600">ارفع صورة</span>
                                                    <input type="file" accept="image/*" onChange={handleImageChange} className="hidden" />
                                                </label>
                                                {imagePreview && <div className="relative w-28 h-28 rounded-3xl overflow-hidden border-2 border-blue-100 shadow-sm"><img src={imagePreview} className="w-full h-full object-cover" /><button onClick={() => {setImage(null); setImagePreview(null);}} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1.5 shadow-lg"><Icon name="X" className="w-3 h-3" /></button></div>}
                                            </div>
                                        </div>
                                        <button onClick={handleGenerate} disabled={generating} className="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-blue-100 flex justify-center items-center gap-3 disabled:opacity-50">
                                            {generating ? <><Icon name="Loader2" className="w-6 h-6 animate-spin" /><span>بنكتبلك عظمة...</span></> : <>{activeTab === 'tiktok' ? <Icon name="Video" className="w-6 h-6" /> : <Icon name="PenTool" className="w-6 h-6" />}<span>{activeTab === 'tiktok' ? 'اكتبلي السكربتات ✨' : 'اكتبلي البوستات ✨'}</span></>}
                                        </button>
                                        {(activeTab === 'tiktok' ? generatedScripts : generatedPosts).length > 0 && (
                                            <div className="space-y-6 mt-8">
                                                <h3 className="text-lg font-black text-gray-900 text-center">{activeTab === 'tiktok' ? 'اختار السكربت اللي يعجبك 🎬' : 'اختار البوست اللي يعجبك ✨'}</h3>
                                                {(activeTab === 'tiktok' ? generatedScripts : generatedPosts).map((item, index) => (
                                                    <motion.div key={index} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: index * 0.1 }} className="p-6 bg-white rounded-[2rem] border-2 border-blue-100 relative shadow-sm">
                                                        <div className="absolute -top-3 -right-3 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-black text-sm">{index + 1}</div>
                                                        <p className="text-gray-800 whitespace-pre-wrap leading-relaxed font-medium">{item}</p>
                                                        <button onClick={() => { navigator.clipboard.writeText(item); setSuccess('تم النسخ بنجاح! ✅'); }} className="mt-4 w-full py-3 bg-blue-50 text-blue-600 font-black rounded-xl border border-blue-100 flex items-center justify-center gap-2 text-sm"><Icon name="Copy" className="w-4 h-4" /> نسخ هذا النص</button>
                                                    </motion.div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            )}
                            {activeTab === 'subscription' && (
                                <motion.div key="subscription" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="space-y-6">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-8">
                                        <div className="text-center space-y-2"><h2 className="text-2xl font-black text-gray-900">حالة الاشتراك</h2><p className="text-gray-500 font-medium">فعل حسابك عشان تستخدم الذكاء الاصطناعي براحتك</p></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-gray-50 p-6 rounded-3xl border text-center"><p className="text-xs text-gray-500 mb-1 font-bold">تاريخ الانتهاء</p><p className="text-lg font-black text-blue-900">{profile?.isActiveUntil ? new Date(profile.isActiveUntil).toLocaleDateString('ar-EG') : 'غير مفعل'}</p></div>
                                            <div className="bg-gray-50 p-6 rounded-3xl border text-center"><p className="text-xs text-gray-500 mb-1 font-bold">حالة الحساب</p><p className={`text-lg font-black ${profile?.isActiveUntil && profile.isActiveUntil > Date.now() ? "text-green-600" : "text-red-500"}`}>{profile?.isActiveUntil && profile.isActiveUntil > Date.now() ? 'نشط ✅' : 'منتهي ❌'}</p></div>
                                        </div>
                                        <div className="space-y-4">
                                            <h3 className="font-black text-gray-800 flex items-center gap-2"><Icon name="Key" className="w-5 h-5 text-blue-600" /> تفعيل كود جديد</h3>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="ادخل الكود هنا" value={activationKey} onChange={e => setActivationKey(e.target.value)} className="flex-1 p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-center font-black uppercase tracking-widest outline-none transition-all" />
                                                <button onClick={handleActivate} className="bg-blue-600 text-white px-8 rounded-2xl font-black">تفعيل</button>
                                            </div>
                                        </div>
                                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2rem] text-white text-center space-y-4 shadow-xl shadow-blue-200"><p className="font-bold opacity-90">للاشتراك أو تجديد الخدمة تواصل معنا:</p><p className="text-4xl font-black tracking-tighter">01090746032</p></div>
                                    </div>
                                </motion.div>
                            )}
                            {activeTab === 'admin' && profile?.role === 'admin' && (
                                <motion.div key="admin" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="space-y-6">
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="flex items-center gap-3 mb-2"><div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Icon name="Users" className="w-5 h-5" /></div><span className="text-xs font-bold text-gray-500">إجمالي المستخدمين</span></div><p className="text-2xl font-black text-gray-900">{allUsersCount}</p></div>
                                        <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="flex items-center gap-3 mb-2"><div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Icon name="BarChart3" className="w-5 h-5" /></div><span className="text-xs font-bold text-gray-500">طلبات الـ AI</span></div><p className="text-2xl font-black text-gray-900">{stats?.aiRequestsCount || 0}</p></div>
                                        <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="flex items-center gap-3 mb-2"><div className="p-2 bg-orange-100 rounded-lg text-orange-600"><Icon name="Key" className="w-5 h-5" /></div><span className="text-xs font-bold text-gray-500">الأكواد المتاحة</span></div><p className="text-2xl font-black text-gray-900">{adminKeys.filter(k=>!k.used).length}</p></div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm space-y-8">
                                        <div className="space-y-4"><h3 className="font-black text-gray-800 flex items-center gap-2"><Icon name="Plus" className="w-5 h-5 text-blue-600" /> توليد أكواد تفعيل</h3><div className="grid grid-cols-2 sm:grid-cols-4 gap-3">{[7, 30, 90, 365].map(days => (<button key={days} onClick={() => generateKey(days)} className="p-4 bg-gray-50 border-2 border-transparent hover:border-blue-500 rounded-2xl font-bold text-sm transition-all">{days === 365 ? 'سنة' : `${days} يوم`}</button>))}</div></div>
                                        <div className="space-y-4">
                                            <h3 className="font-black text-gray-800 flex items-center gap-2"><Icon name="Search" className="w-5 h-5 text-blue-600" /> البحث عن مستخدم</h3>
                                            <div className="flex gap-2"><input type="text" placeholder="ادخل الـ ID" value={searchId} onChange={e => setSearchId(e.target.value)} className="flex-1 p-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-center font-bold outline-none transition-all" /><button onClick={searchUser} className="bg-blue-600 text-white px-8 rounded-2xl font-black">بحث</button></div>
                                            {foundUser && (<div className="p-6 bg-blue-50 rounded-3xl border-2 border-blue-100 flex justify-between items-center"><div><p className="font-black text-blue-900">{foundUser.displayName}</p><p className="text-xs text-blue-600 font-bold">{foundUser.phone}</p></div><div className="flex gap-2"><button onClick={async () => { const newEnd = Date.now() + (30 * 24 * 60 * 60 * 1000); await db.collection('users').doc(foundUser.uid).update({ isActiveUntil: newEnd }); setSuccess('تم تفعيل شهر'); searchUser(); }} className="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">تفعيل شهر</button><button onClick={async () => { await db.collection('users').doc(foundUser.uid).update({ isActiveUntil: null }); setSuccess('تم إلغاء التفعيل'); searchUser(); }} className="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold">إلغاء</button></div></div>)}
                                        </div>
                                        <div className="space-y-4"><h3 className="font-black text-gray-800">الأكواد الأخيرة</h3><div className="space-y-2 max-h-[300px] overflow-y-auto pr-2">{adminKeys.map(k => (<div key={k.id} className={`p-4 rounded-2xl border flex justify-between items-center ${k.used ? "bg-gray-50 opacity-50" : "bg-white border-blue-100"}`}><div><p className="font-black text-sm tracking-widest">{k.id}</p><p className="text-[10px] font-bold text-gray-500">{k.days} يوم</p></div><div className="flex items-center gap-3">{!k.used && <button onClick={() => { navigator.clipboard.writeText(k.id); setSuccess('تم النسخ'); }} className="p-2 text-blue-600"><Icon name="Copy" className="w-4 h-4" /></button>}<button onClick={async () => { await db.collection('activationKeys').doc(k.id).delete(); }} className="p-2 text-red-400"><Icon name="Trash2" className="w-4 h-4" /></button></div></div>))}</div></div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t px-4 py-3 z-50">
                        <div className="max-w-4xl mx-auto flex justify-around items-center">
                            <button onClick={() => setActiveTab('generate')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'generate' ? "text-blue-600 scale-110" : "text-gray-400"}`}><Icon name="LayoutDashboard" className="w-6 h-6" /><span className="text-[10px] font-black">الرئيسية</span></button>
                            <button onClick={() => setActiveTab('subscription')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'subscription' ? "text-blue-600 scale-110" : "text-gray-400"}`}><Icon name="CreditCard" className="w-6 h-6" /><span className="text-[10px] font-black">الاشتراك</span></button>
                        </div>
                    </nav>

                    {success && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full font-bold shadow-lg z-[100] animate-bounce">{success}</div>}
                    {error && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-bold shadow-lg z-[100] animate-shake">{error}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
